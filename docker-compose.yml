services:
  db:
    image: postgres:15-alpine
    container_name: opkit-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: opkit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: opkit-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
